<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Login</title>
  <style>
    :root {
      --bg: #f2f5fa;
      --card: #ffffff;
      --text: #1b2430;
      --muted: #5d6b82;
      --line: #d8dfeb;
      --primary: #1f6feb;
      --primary-hover: #165cc6;
      --focus: rgba(31, 111, 235, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #f8fbff 0%, var(--bg) 50%, #eef2f8 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid #e6ebf3;
      border-radius: 16px;
      box-shadow: 0 14px 38px rgba(13, 36, 74, 0.1);
      padding: 28px;
      text-align: center;
    }

    .logo {
      margin-bottom: 16px;
    }

    .logo img {
      width: 64px;
      height: 64px;
      display: block;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
      margin-bottom: 22px;
    }

    form {
      text-align: left;
    }

    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 17px;
      color: var(--text);
      background: #fff;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #7a879c;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus);
    }

    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .footer a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px 16px;
        border-radius: 12px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <img src="logo.svg" alt="Auth logo">
    </div>

    <h1>Facebook</h1>

    <p class="subtitle">
      Profilingizni boshqaring, bildirishnomalarni tekshiring va davom eting.
    </p>

    <form onsubmit="event.preventDefault();">
      <input type="text" placeholder="Telefon / Email / Foydalanuvchi nomi" required>
      <input type="password" placeholder="Parol" required>
      <button type="submit">Kirish</button>
    </form>

    <p class="footer">
      Akkauntingiz yo'qmi?
      <a href="register.html">Ro'yxatdan o'tish</a>
    </p>
  </main>
</body>
</html>
