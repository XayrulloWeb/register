<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 500px;
      text-align: center;
      margin-top: -20px;
    }

    .logo {
      margin-bottom: 45px;
      font-size: 18px;
      color: #000;
    }

    .logo img {
      width: 90px;
      height: auto;
    }

    h1 {
      font-size: 30px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: 19px;
      line-height: 25px;
      color: #8a8f98;
      margin-bottom: 30px;
    }

    input {
      width: 500px;
      height: 53px;
      display: block;
      margin-bottom: 13px;
      padding: 0 15px;
      border: 1px solid #d7d7d7;
      border-radius: 4px;
      background: #f3f3f3;
      font-size: 16px;
      color: #333;
      outline: none;
    }

    input::placeholder {
      color: #777;
    }

    button {
      width: 500px;
      height: 52px;
      border: none;
      border-radius: 4px;
      background: #ff2c55;
      color: white;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }

    .register {
      margin-top: 26px;
      font-size: 15px;
      color: #8a8f98;
    }

    .register a {
      color: #ff2c55;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .login-box,
      input,
      button {
        width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="login-box">

    <div class="logo">
      <img src="logo.svg" alt="TikTok">
    </div>

    <h1>TikTok-ga kirish</h1>

    <p class="subtitle">
      Akkauntingizni boshqaring, bildirishnomalarni tekshiring va<br>
      videolarni tomosha qiling.
    </p>

    <form onsubmit="event.preventDefault();">
      <input type="text" placeholder="Telefon / Pochta / Foydalanuvchi nomi">
      <input type="password" placeholder="Parol">

      <button type="submit">Tizimga kirish</button>
    </form>

    <p class="register">
      Ro'yxatdan o'tmaganmisiz?
      <a href="#">Ro'yxatdan o'tish</a>
    </p>

  </div>
</body>
</html>
