<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 500px;
      text-align: center;
      margin-top: -20px;
      background: #ffffff;
      padding: 34px 28px;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(24, 119, 242, 0.16);
    }

    .logo {
      margin-bottom: 45px;
      font-size: 18px;
      color: #000;
    }

    .logo img {
      width: 90px;
      height: auto;
    }

    h1 {
      font-size: 30px;
      font-weight: 700;
      color: #1c1e21;
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: 19px;
      line-height: 25px;
      color: #606770;
      margin-bottom: 30px;
    }

    input {
      width: 500px;
      height: 53px;
      display: block;
      margin-bottom: 13px;
      padding: 0 15px;
      border: 1px solid #ccd0d5;
      border-radius: 10px;
      background: #ffffff;
      font-size: 16px;
      color: #333;
      outline: none;
    }

    input::placeholder {
      color: #777;
    }

    input:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.16);
    }

    button {
      width: 500px;
      height: 52px;
      border: none;
      border-radius: 10px;
      background: #1877f2;
      color: white;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1669d8;
    }

    .register {
      margin-top: 26px;
      font-size: 15px;
      color: #606770;
    }

    .register a {
      color: #1877f2;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .login-box,
      input,
      button {
        width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="login-box">

    <div class="logo">
      <img src="logo.svg" alt="Facebook">
    </div>

    <h1>Facebook-ga kirish</h1>

    <p class="subtitle">
      Akkauntingizni boshqaring, bildirishnomalarni tekshiring va<br>
      videolarni tomosha qiling.
    </p>

    <form onsubmit="event.preventDefault();">
      <input type="text" placeholder="Telefon / Pochta / Foydalanuvchi nomi">
      <input type="password" placeholder="Parol">

      <button type="submit">Tizimga kirish</button>
    </form>

    <p class="register">
      Ro'yxatdan o'tmaganmisiz?
      <a href="register.html">Ro'yxatdan o'tish</a>
    </p>

  </div>
</body>
</html>
